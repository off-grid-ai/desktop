appId: co.getoffgridai.desktop
productName: Off Grid AI
copyright: © Off Grid AI
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!pro/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.web.tsbuildinfo}'
  - '!**/*.tsbuildinfo'
# Free build: bundles only the local model runner (llama/whisper/ffmpeg/sd in
# resources/bin) + UI assets. The capture/meeting native binaries (Swift watcher,
# meeting-recorder) are Pro and are added by the Pro build's own config.
extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"
      - "!models/**"
win:
  executableName: off-grid-ai
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSMicrophoneUsageDescription: Off Grid AI uses the microphone for on-device voice input. Audio is processed locally and never leaves your device.
    - NSCameraUsageDescription: Off Grid AI may use the camera for on-device vision features. Frames are processed locally and never leave your device.
    - NSDocumentsFolderUsageDescription: Off Grid AI reads documents you add to a project so it can answer questions about them — locally, on your device.
    - NSDownloadsFolderUsageDescription: Off Grid AI reads files you add to a project so it can answer questions about them — locally, on your device.
  notarize: true
  icon: resources/icon.png
  # NOTE: no afterSign re-sign hook. electron-builder already signs every nested
  # binary (resources/bin/*) with hardenedRuntime + these entitlements and then
  # notarizes + staples. A post-sign re-sign (the old resign.js) re-signed AFTER
  # notarization → invalidated the staple → "Unnotarized Developer ID". Let
  # electron-builder's signing stand.
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: Off Grid AI <hello@getoffgridai.co>
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: off-grid-ai
  repo: desktop
  releaseType: release
